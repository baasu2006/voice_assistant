{% extends "base.html" %}
{% block title %}VoiceAI – Sign Up{% endblock %}
{% block head %}
<style>
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{width:100%;max-width:420px}
.logo{text-align:center;margin-bottom:28px}
.logo h1{font-size:30px;font-weight:700;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo p{color:var(--muted);font-size:13px;margin-top:5px}
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:30px}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.fg input{width:100%;padding:11px 13px;background:var(--bg);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:14px;font-family:inherit;transition:border-color .2s}
.fg input:focus{outline:none;border-color:var(--acc)}
.full{width:100%;justify-content:center;padding:12px}
.div{text-align:center;color:var(--muted);font-size:12px;margin:16px 0;position:relative}
.div::before,.div::after{content:'';position:absolute;top:50%;width:44%;height:1px;background:var(--border)}
.div::before{left:0}.div::after{right:0}
.btn-google{width:100%;justify-content:center;background:#fff;color:#333}
.btn-google:hover{background:#f0f0f0}
.foot{text-align:center;margin-top:18px;font-size:13px;color:var(--muted)}
</style>
{% endblock %}
{% block body %}
<div class="wrap">
  <div class="box">
    <div class="logo"><h1>🎙️ VoiceAI</h1><p>Create your account</p></div>
    <div class="card">
      <div class="fg"><label>Username</label><input id="U" type="text" placeholder="Choose username" autocomplete="username"/></div>
      <div class="fg"><label>Email</label><input id="E" type="email" placeholder="you@example.com" autocomplete="email"/></div>
      <div class="fg"><label>Password</label><input id="P" type="password" placeholder="Min 6 characters" autocomplete="new-password"/></div>
      <button class="btn btn-primary full" onclick="doSignup()">Create Account</button>
      {% if google_configured %}
      <div class="div">or</div>
      <a href="/auth/google" class="btn btn-google">
        <svg width="17" height="17" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign up with Google
      </a>
      {% endif %}
    </div>
    <div class="foot">Have account? <a href="/login">Sign in</a></div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('P').onkeydown=e=>{if(e.key==='Enter')doSignup()};
async function doSignup(){
  const u=document.getElementById('U').value.trim(),em=document.getElementById('E').value.trim(),p=document.getElementById('P').value;
  if(!u||!em||!p){showToast('All fields required','error');return}
  if(p.length<6){showToast('Password min 6 chars','error');return}
  const d=await fetch('/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,email:em,password:p})}).then(r=>r.json());
  if(d.success){showToast('Account created!','success');setTimeout(()=>location.href=d.redirect,400)}
  else showToast(d.message,'error');
}
</script>
{% endblock %}
