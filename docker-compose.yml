version: "3.9"
services:
  voiceai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voiceai-app
    ports:
      - "5000:5000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
